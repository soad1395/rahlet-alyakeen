<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
background:radial-gradient(circle,#020617,#020617,#020617);
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
font-size:40px;
text-shadow:0 0 25px #00f2ff;
}

.box{
background:#0f172a;
margin:25px;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px #00f2ff;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
cursor:pointer;
}

.circle{
width:140px;
height:140px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px #00f2ff;
}

.a{background:#facc15}
.b{background:#22c55e}
.c{background:#ef4444}
.d{background:#3b82f6}

.robot{
position:fixed;
bottom:20px;
left:20px;
width:110px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<h1>🧠 عالم بصمة الذكاء</h1>

<img class="robot" src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<div class="box">

<h2>البيانات الأساسية</h2>

<input placeholder="اسم المدرسة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
<input placeholder="عنوان الدرس">

</div>

<div class="box">

<h2>الفصول</h2>

<input id="classInput" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة فصل</button>

<ul id="classes"></ul>

</div>

<div class="box">

<h2>المجموعات</h2>

<input id="groupInput" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>

<table width="100%" border="1">

<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
</tr>

<tbody id="groups"></tbody>

</table>

</div>

<div class="box">

<h2>السؤال</h2>

<input id="questionInput" placeholder="اكتب السؤال">
<button onclick="showQuestion()">عرض السؤال</button>

<h3 id="question"></h3>

<div>

<div class="circle a" onclick="answer(0)">A</div>
<div class="circle b" onclick="answer(1)">B</div>
<div class="circle c" onclick="answer(2)">C</div>
<div class="circle d" onclick="answer(3)">D</div>

</div>

</div>

<div class="box">

<button onclick="winner()">🏆 إعلان الفريق الفائز</button>

</div>

<audio id="startSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>
<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

let groups=[]
let correctAnswer=1

window.onload=function(){

document.getElementById("startSound").play()

speak("مرحباً بكم في عالم بصمة الذكاء")

}

function speak(text){

let speech=new SpeechSynthesisUtterance()

speech.lang="ar-SA"

speech.text=text

speech.rate=0.9

speech.pitch=1.2

speechSynthesis.speak(speech)

}

function addClass(){

let name=document.getElementById("classInput").value

let li=document.createElement("li")

li.innerText=name

document.getElementById("classes").appendChild(li)

}

function addGroup(){

let name=document.getElementById("groupInput").value

groups.push({name:name,points:0})

render()

}

function render(){

let html=""

groups.forEach((g,i)=>{

html+=`
<tr>
<td>${g.name}</td>
<td>${g.points}</td>
<td><button onclick="addPoint(${i})">+</button></td>
<td><button onclick="minusPoint(${i})">-</button></td>
</tr>
`

})

document.getElementById("groups").innerHTML=html

}

function addPoint(i){

groups[i].points++

render()

}

function minusPoint(i){

groups[i].points--

render()

}

function showQuestion(){

let q=document.getElementById("questionInput").value

document.getElementById("question").innerText=q

speak(q)

}

function answer(i){

if(i==correctAnswer){

document.getElementById("correctSound").play()

speak("إجابة ذكية رائعة")

alert("⭐ إجابة صحيحة")

}else{

document.getElementById("wrongSound").play()

speak("محاولة جيدة")

alert("❌ إجابة خاطئة")

}

}

function winner(){

let max=0
let name=""

groups.forEach(g=>{

if(g.points>max){

max=g.points
name=g.name

}

})

speak("الفريق الفائز هو "+name)

alert("🏆 الفريق الفائز: "+name)

}

</script>

</body>
</html>
