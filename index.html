 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
margin:0;
color:white;
text-align:center;

background:linear-gradient(270deg,#020617,#0f172a,#020617);
background-size:600% 600%;
animation:bg 15s infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
padding:20px;
}

.box{
background:#020617;
border-radius:20px;
padding:25px;
margin:20px auto;
width:90%;
box-shadow:0 0 35px #00e5ff;
}

input,select{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
width:160px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
cursor:pointer;
}

.answer{
width:150px;
height:150px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:20px;
font-size:18px;
cursor:pointer;
transition:.4s;
box-shadow:0 0 25px #00e5ff;
}

.answer:hover{
transform:scale(1.1);
}

.a{background:#facc15}
.b{background:#22c55e}
.c{background:#ef4444}
.d{background:#3b82f6}

.robot{
position:fixed;
bottom:20px;
left:20px;
width:90px;
animation:robot 2s infinite alternate;
}

@keyframes robot{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

.trophy{
font-size:60px;
animation:cup 1s infinite alternate;
}

@keyframes cup{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 عالم بصمة الذكاء</h1>

<div class="box">

<h2>الفصول</h2>

<input id="className" placeholder="اسم الفصل">

<button onclick="addClass()">إضافة فصل</button>

<ul id="classList"></ul>

</div>


<div class="box">

<h2>المجموعات</h2>

<input id="groupName" placeholder="اسم المجموعة">

<select id="groupClass"></select>

<button onclick="addGroup()">إضافة</button>

<table border="1" width="100%" style="margin-top:15px">
<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
</tr>
<tbody id="groups"></tbody>
</table>

</div>


<div class="box">

<h2>السؤال</h2>

<input id="question" placeholder="اكتب السؤال">

<br><br>

<input id="a1" placeholder="الإجابة 1">
<input id="a2" placeholder="الإجابة 2">
<input id="a3" placeholder="الإجابة 3">
<input id="a4" placeholder="الإجابة 4">

<br><br>

<select id="correct">

<option value="1">الإجابة الصحيحة 1</option>
<option value="2">الإجابة الصحيحة 2</option>
<option value="3">الإجابة الصحيحة 3</option>
<option value="4">الإجابة الصحيحة 4</option>

</select>

<button onclick="loadQuestion()">عرض السؤال</button>

</div>


<div class="box">

<h2 id="qText"></h2>

<div class="answer a" onclick="check(1)" id="b1"></div>
<div class="answer b" onclick="check(2)" id="b2"></div>
<div class="answer c" onclick="check(3)" id="b3"></div>
<div class="answer d" onclick="check(4)" id="b4"></div>

</div>


<div class="box">

<button onclick="winner()">🏆 إعلان الفريق الفائز</button>

<h2 id="win"></h2>

</div>

</div>

<img class="robot"
src="https://cdn-icons-png.flaticon.com/512/4712/4712100.png">

<script>

let correctAnswer=1

function speak(text){

let speech=new SpeechSynthesisUtterance(text)
speech.lang="ar-SA"
speech.rate=0.9
speech.pitch=1

speechSynthesis.speak(speech)

}

window.onload=function(){

speak("مرحباً بكم في عالم بصمة الذكاء. استعدوا للتحدي")

}

function addClass(){

let name=document.getElementById("className").value

let li=document.createElement("li")

li.innerText=name

document.getElementById("classList").appendChild(li)

let opt=document.createElement("option")
opt.innerText=name

document.getElementById("groupClass").appendChild(opt)

}

function addGroup(){

let g=document.getElementById("groupName").value
let c=document.getElementById("groupClass").value

let tr=document.createElement("tr")

tr.innerHTML=
"<td>"+c+"</td>"+
"<td>"+g+"</td>"+
"<td class='points'>0</td>"

document.getElementById("groups").appendChild(tr)

}

function loadQuestion(){

let q=document.getElementById("question").value

document.getElementById("qText").innerText=q

document.getElementById("b1").innerText=document.getElementById("a1").value
document.getElementById("b2").innerText=document.getElementById("a2").value
document.getElementById("b3").innerText=document.getElementById("a3").value
document.getElementById("b4").innerText=document.getElementById("a4").value

correctAnswer=document.getElementById("correct").value

speak(q)

}

function check(num){

if(num==correctAnswer){

speak("إجابة رائعة")

event.target.style.background="green"

let p=document.querySelector(".points")

p.innerText=parseInt(p.innerText)+1

}else{

speak("إجابة غير صحيحة")

event.target.style.background="red"

}

}

function winner(){

let rows=document.querySelectorAll("#groups tr")

let max=0
let win=""

rows.forEach(r=>{

let p=parseInt(r.children[2].innerText)

if(p>max){

max=p
win=r.children[1].innerText

}

})

document.getElementById("win").innerHTML="<div class='trophy'>🏆</div> الفريق الفائز: "+win

speak("الفريق الفائز هو "+win)

}

</script>

</body>
</html>
