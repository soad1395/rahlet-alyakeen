 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رحلة اليقين</title>

<style>

body{
font-family:Tahoma;
direction:rtl;
text-align:center;
background:#eef5f3;
margin:0;
}

header{
background:#2fb487;
color:white;
padding:15px;
font-size:24px;
}

.info{
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.container{
background:white;
width:450px;
margin:30px auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

input,select,textarea{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2fb487;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.station{
background:#f4f4f4;
padding:15px;
margin:15px 0;
border-radius:10px;
}

.progress{
background:#ddd;
height:10px;
border-radius:10px;
margin:15px 0;
}

.bar{
background:#2fb487;
height:10px;
width:0%;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

.adminBtn{
font-size:13px;
cursor:pointer;
color:#555;
}

</style>
</head>

<body>

<header>منصة رحلة اليقين</header>

<div class="info">

<b>اسم المدرسة:</b> ___________<br>
<b>اسم المديرة:</b> ___________<br>
<b>اسم المعلمة:</b> ___________<br>
<b>عنوان الدرس:</b> ___________<br>
<b>التاريخ:</b> ___________

</div>

<!-- صفحة البداية -->

<div class="container" id="start">

<h3>بيانات الطالبة</h3>

<input id="studentName" placeholder="اسم الطالبة">

<select id="classSelect">
<option>الأول ثانوي</option>
<option>الثاني ثانوي</option>
<option>الثالث ثانوي</option>
</select>

<select id="subjectSelect">
<option>التوحيد</option>
<option>الحديث</option>
<option>الفقه</option>
</select>

<button onclick="startLesson()">ابدئي الرحلة</button>

<p class="adminBtn" onclick="openArchive()">لوحة المعلمة</p>

</div>

<!-- صفحة الدرس -->

<div class="container" id="lessonPage" style="display:none">

<h3>فيديو الدرس</h3>

<iframe width="360" height="200"
src="https://www.youtube.com/embed/VIDEOID"
frameborder="0"
allowfullscreen></iframe>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<h3>محطات التعلم</h3>

<div class="station">
محطة الاكتشاف<br>
<textarea id="q1"></textarea>
</div>

<div class="station">
محطة الفهم<br>
<textarea id="q2"></textarea>
</div>

<div class="station">
محطة التطبيق<br>
<textarea id="q3"></textarea>
</div>

<div class="station">
محطة التأمل<br>
<textarea id="q4"></textarea>
</div>

<button onclick="saveAnswers()">حفظ الإجابات</button>

</div>

<!-- الأرشيف -->

<div class="container" id="archivePage" style="display:none">

<h3>أرشيف الطالبات</h3>

<table>

<tr>
<th>الاسم</th>
<th>الصف</th>
<th>المادة</th>
<th>الإجابات</th>
</tr>

<tbody id="archiveTable"></tbody>

</table>

</div>

<script>

let archive = JSON.parse(localStorage.getItem("archive")) || [];

function startLesson(){

let name=document.getElementById("studentName").value;

if(name==""){
alert("اكتبي اسم الطالبة");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("lessonPage").style.display="block";

}

function saveAnswers(){

let name=document.getElementById("studentName").value;
let cls=document.getElementById("classSelect").value;
let sub=document.getElementById("subjectSelect").value;

let answers=
document.getElementById("q1").value+" | "+
document.getElementById("q2").value+" | "+
document.getElementById("q3").value+" | "+
document.getElementById("q4").value;

archive.push({name,cls,sub,answers});

localStorage.setItem("archive",JSON.stringify(archive));

document.getElementById("progressBar").style.width="100%";

alert("تم حفظ الإجابات");

}

function openArchive(){

document.getElementById("start").style.display="none";
document.getElementById("archivePage").style.display="block";

let table=document.getElementById("archiveTable");

archive.forEach(a=>{

let row=`
<tr>
<td>${a.name}</td>
<td>${a.cls}</td>
<td>${a.sub}</td>
<td>${a.answers}</td>
</tr>
`;

table.innerHTML+=row;

});

}

</script>

</body>
</html>
