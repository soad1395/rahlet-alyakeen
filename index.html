 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>

html,body{
height:100%;
margin:0;
font-family:tahoma;
color:white;
text-align:center;
overflow:hidden;
}

/* 🎥 خلفية كاملة */

#bgVideo{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.5);
z-index:-1;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
overflow-y:auto;
height:100vh;
}

.box{
background:#031429cc;
padding:20px;
margin:20px;
border-radius:20px;
box-shadow:0 0 25px #00eaff55;
}

input,select{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#00eaff;
color:black;
cursor:pointer;
}

/* إجابات */

.answers{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.circle{
width:110px;
height:110px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#111;
box-shadow:0 0 15px #00eaff;
cursor:pointer;
}

.correct{background:green;}
.wrong{background:red;}

.robot{
position:fixed;
bottom:10px;
left:10px;
font-size:70px;
}

.trophy{
font-size:60px;
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop></video>
<div class="overlay"></div>

<div class="container">

<h1>🤖 منصة بصمة الذكاء</h1>

<!-- 🎥 الخلفية -->
<div class="box">
<h3>🎥 اختيار الخلفية</h3>
<input type="file" accept="video/*" onchange="loadVideo(event)">
</div>

<!-- 📋 البيانات الأساسية -->
<div class="box">
<h3>📋 البيانات الأساسية</h3>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المديرة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- 👥 الفصول -->
<div class="box">
<h3>👥 الفصول</h3>
<input id="className" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة</button>
<ul id="classList"></ul>
</div>

<!-- 👨‍👩‍👧 المجموعات -->
<div class="box">
<h3>👨‍👩‍👧 المجموعات</h3>

<select id="classSelect"></select>
<input id="groupName" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>

<br><br>

<select id="groupSelect"></select>

<table id="groupsTable" width="100%"></table>

</div>

<!-- 🎮 السؤال -->
<div class="box">

<h3>🎮 السؤال</h3>

<input id="question" placeholder="اكتب السؤال"><br>

<input id="a1" placeholder="إجابة 1">
<input id="a2" placeholder="إجابة 2">
<input id="a3" placeholder="إجابة 3">
<input id="a4" placeholder="إجابة 4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<br><br>

<button onclick="showQuestion()">عرض السؤال</button>

<div class="answers" id="answers"></div>

</div>

<!-- 🏆 الفائز -->
<div class="box">
<button onclick="winner()">🏆 إعلان الفائز</button>
<h2 id="winner"></h2>
</div>

</div>

<div class="robot">🤖</div>

<script>

/* فيديو */
function loadVideo(e){
bgVideo.src=URL.createObjectURL(e.target.files[0])
}

/* صوت */
function speak(text){
speechSynthesis.cancel()
let msg=new SpeechSynthesisUtterance(text)
msg.lang="ar-SA"
msg.rate=0.9
speechSynthesis.speak(msg)
}

document.body.addEventListener("click", ()=>{
speak("مرحباً بكم في عالم الذكاء الاصطناعي");
},{once:true});

/* بيانات */
let classes=[]
let groups=[]
let correctAnswer=0

/* فصول */
function addClass(){
let name=className.value
if(!name)return

classes.push(name)

let li=document.createElement("li")
li.innerHTML=name+` <button onclick="deleteClass(${classes.length-1})">❌</button>`
classList.appendChild(li)

classSelect.add(new Option(name,name))
}

/* حذف فصل */
function deleteClass(i){
classes.splice(i,1)
location.reload()
}

/* مجموعات */
function addGroup(){
let c=classSelect.value
let g=groupName.value
if(!g)return

groups.push({class:c,name:g,points:0})

groupSelect.add(new Option(g,g))

renderGroups()
}

function renderGroups(){

groupsTable.innerHTML=`<tr><th>الفصل</th><th>المجموعة</th><th>النقاط</th></tr>`

groups.forEach(g=>{
groupsTable.innerHTML+=`
<tr>
<td>${g.class}</td>
<td>${g.name}</td>
<td>${g.points}</td>
</tr>
`
})
}

/* سؤال */
function showQuestion(){

let q=question.value
setTimeout(()=>speak(q),500)

let arr=[a1.value,a2.value,a3.value,a4.value]

correctAnswer=parseInt(correct.value)

answers.innerHTML=""

arr.forEach((a,i)=>{

let d=document.createElement("div")
d.className="circle"
d.innerText=a

d.onclick=function(){

let g=groups.find(x=>x.name==groupSelect.value)

if(i==correctAnswer){
d.classList.add("correct")
speak("إجابة صحيحة")

if(g){
g.points++
renderGroups()
}

}else{
d.classList.add("wrong")
speak("إجابة خاطئة")
}

}

answers.appendChild(d)

})

}

/* فائز */
function winner(){

if(groups.length==0)return

let best=groups.reduce((a,b)=>a.points>b.points?a:b)

winner.innerHTML="🏆 "+best.name+" 🔥"

let clap=new Audio("https://www.soundjay.com/human/applause-8.mp3")
clap.play()

speak("الفريق الفائز هو "+best.name)

}

</script>

</body>
</html>
