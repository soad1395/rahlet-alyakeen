 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* خلفية احترافية متحركة */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle,#00eaff33 2px,transparent 2px);
background-size:80px 80px;
animation:stars 40s linear infinite;
z-index:-2;
}

@keyframes stars{
0%{transform:translateY(0)}
100%{transform:translateY(200px)}
}

/* نيون */

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(270deg,#020617,#001a2e,#00eaff,#001a2e,#020617);
background-size:800% 800%;
animation:neon 15s infinite;
z-index:-1;
}

@keyframes neon{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.box{
background:#031429;
padding:25px;
margin:25px 0;
border-radius:20px;
box-shadow:0 0 25px #00eaff55;
}

input,select{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
width:180px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#00eaff;
color:black;
cursor:pointer;
font-weight:bold;
}

.answers{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px #00eaff;
transition:0.3s;
}

.circle:hover{transform:scale(1.1)}
.correct{background:#22c55e !important;}
.wrong{background:#ef4444 !important;}

.robot{
position:fixed;
bottom:20px;
left:20px;
font-size:70px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.trophy{
font-size:60px;
animation:cup 1s infinite alternate;
}

@keyframes cup{
from{transform:scale(1)}
to{transform:scale(1.3)}
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 عالم بصمة الذكاء</h1>

<div class="box">
<h2>📋 البيانات الأساسية</h2>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المديرة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<div class="box">
<h2>👥 الفصول</h2>
<input id="className" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة</button>
<ul id="classList"></ul>
</div>

<div class="box">
<h2>👨‍👩‍👧 المجموعات</h2>
<select id="classSelect"></select>
<input id="groupName" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>

<table width="100%" id="groupsTable">
<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
</tr>
</table>
</div>

<div class="box">
<h2>🎮 السؤال</h2>

<input id="question" placeholder="اكتب السؤال"><br>

<input id="a1" placeholder="إجابة 1">
<input id="a2" placeholder="إجابة 2">
<input id="a3" placeholder="إجابة 3">
<input id="a4" placeholder="إجابة 4"><br>

<select id="correct">
<option value="1">الإجابة الصحيحة 1</option>
<option value="2">الإجابة الصحيحة 2</option>
<option value="3">الإجابة الصحيحة 3</option>
<option value="4">الإجابة الصحيحة 4</option>
</select>

<br><br>

<button onclick="showQuestion()">عرض السؤال</button>

<div class="answers" id="answers"></div>

</div>

<div class="box">
<button onclick="winner()">🏆 إعلان الفائز</button>
<div id="winner"></div>
</div>

</div>

<div class="robot">🤖</div>

<script>

let classes=[]
let groups=[]
let currentCorrect=1

/* الصوت */
function speak(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="ar-SA"
speechSynthesis.speak(msg)
}

/* تشغيل الصوت بعد أول لمس */
document.body.addEventListener("click", function(){
speak("مرحباً بكم في عالم بصمة الذكاء");
},{once:true});

/* الفصول */
function addClass(){
let name=document.getElementById("className").value
if(!name)return

classes.push(name)

let li=document.createElement("li")
li.innerText=name
document.getElementById("classList").appendChild(li)

let op=document.createElement("option")
op.value=name
op.text=name
document.getElementById("classSelect").appendChild(op)
}

/* المجموعات */
function addGroup(){
let c=document.getElementById("classSelect").value
let g=document.getElementById("groupName").value

if(!g)return

groups.push({class:c,name:g,points:0})
renderGroups()
}

function renderGroups(){

let table=document.getElementById("groupsTable")

table.innerHTML=`
<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
</tr>
`

groups.forEach((g,i)=>{
table.innerHTML+=`
<tr>
<td>${g.class}</td>
<td>${g.name}</td>
<td>${g.points}</td>
</tr>
`
})
}

/* عرض السؤال */
function showQuestion(){

let q=document.getElementById("question").value
speak(q)

let answers=[
document.getElementById("a1").value,
document.getElementById("a2").value,
document.getElementById("a3").value,
document.getElementById("a4").value
]

currentCorrect=parseInt(document.getElementById("correct").value)

let box=document.getElementById("answers")
box.innerHTML=""

answers.forEach((a,i)=>{

let div=document.createElement("div")
div.className="circle"
div.innerText=a

div.onclick=function(){

if((i+1)==currentCorrect){

div.classList.add("correct")
speak("إجابة صحيحة رائع")

if(groups.length>0){
groups[0].points++
renderGroups()
}

}else{

div.classList.add("wrong")
speak("إجابة خاطئة حاولي مرة أخرى")

}

}

box.appendChild(div)

})
}

/* الفائز */
function winner(){

if(groups.length==0)return

let best=groups.reduce((a,b)=>a.points>b.points?a:b)

document.getElementById("winner").innerHTML=
"<div class='trophy'>🏆</div>"+best.name+" ("+best.class+")"

speak("الفريق الفائز هو "+best.name)

}

</script>

</body>
</html>
