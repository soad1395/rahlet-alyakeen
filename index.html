 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
margin:0;
background:#020f18;
color:white;
text-align:center;
}

/* خلفية الذكاء */

body:before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%,#00e5ff33,transparent),
radial-gradient(circle at 70% 60%,#00e5ff33,transparent);
animation:move 8s infinite alternate;
z-index:-1;
}

@keyframes move{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(120deg)}
}

header{
font-size:34px;
padding:20px;
text-shadow:0 0 20px #00e5ff;
}

.card{
background:#021c2d;
margin:20px auto;
width:85%;
max-width:900px;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px #00e5ff44;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00e5ff;
cursor:pointer;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.blue{background:#2196f3}
.red{background:#f44336}
.green{background:#4caf50}
.yellow{background:#ffc107;color:black}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #00e5ff;
padding:8px;
}

</style>

</head>

<body>

<header>🧠 عالم بصمة الذكاء</header>

<!-- صوت البداية -->

<audio autoplay>
<source src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-music-689.mp3">
</audio>

<div class="card">

<h3>البيانات الأساسية</h3>

<input placeholder="اسم المدرسة">
<input placeholder="اسم المديرة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
<input placeholder="عنوان الدرس">

</div>

<div class="card">

<h3>المجموعات</h3>

<input id="teamName" placeholder="اسم المجموعة">

<button onclick="addTeam()">إضافة</button>

<table id="teamsTable">

<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
<th>حذف</th>
</tr>

</table>

<button onclick="winner()">🏆 إعلان الفائز</button>

<h2 id="winner"></h2>

</div>

<div class="card">

<h3>السؤال</h3>

<input id="questionInput" placeholder="اكتب السؤال">

<button onclick="addQuestion()">إضافة السؤال</button>

<h2 id="questionTitle">السؤال يظهر هنا</h2>

<div class="circle blue" onclick="wrong()">الصوم فقط</div>
<div class="circle red" onclick="wrong()">الدعاء فقط</div>
<div class="circle green" onclick="correct()">تشمل كل جوانب الحياة</div>
<div class="circle yellow" onclick="wrong()">الصلاة فقط</div>

</div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"></audio>

<script>

let groups=[]

function addTeam(){

let name=document.getElementById("teamName").value

groups.push({name:name,points:0})

renderGroups()

}

function renderGroups(){

let table=document.getElementById("teamsTable")

table.innerHTML=`
<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
<th>حذف</th>
</tr>
`

groups.forEach((g,i)=>{

table.innerHTML+=`
<tr>
<td>${g.name}</td>
<td>${g.points}</td>
<td><button onclick="addPoint(${i})">+</button></td>
<td><button onclick="minusPoint(${i})">-</button></td>
<td><button onclick="deleteGroup(${i})">X</button></td>
</tr>
`

})

}

function addPoint(i){
groups[i].points++
renderGroups()
}

function minusPoint(i){
groups[i].points--
renderGroups()
}

function deleteGroup(i){
groups.splice(i,1)
renderGroups()
}

function winner(){

if(groups.length==0) return

let win=groups.reduce((a,b)=>a.points>b.points?a:b)

document.getElementById("winner").innerText="🏆 الفريق الفائز: "+win.name

}

function addQuestion(){

let q=document.getElementById("questionInput").value

document.getElementById("questionTitle").innerText=q

}

function correct(){

document.getElementById("correctSound").play()

alert("⭐ إجابة صحيحة")

}

function wrong(){

document.getElementById("wrongSound").play()

alert("❌ إجابة خاطئة")

}

</script>

</body>
</html>
