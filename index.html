 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
margin:0;
background:radial-gradient(circle,#020617,#020617,#020617);
color:white;
text-align:center;
overflow-x:hidden;
}

/* خلفية نيون */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 20%,#00eaff33,transparent),
radial-gradient(circle at 80% 80%,#00eaff33,transparent);
animation:bgmove 8s infinite alternate;
z-index:-1;
}

@keyframes bgmove{
0%{transform:scale(1)}
100%{transform:scale(1.1)}
}

h1{
font-size:38px;
margin-top:20px;
text-shadow:0 0 25px #00eaff;
}

.box{
background:#0f172a;
margin:25px;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px #00eaff;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
cursor:pointer;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
font-size:18px;
background:#1e293b;
box-shadow:0 0 20px cyan;
}

.robot{
position:fixed;
bottom:20px;
left:20px;
width:110px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid cyan;
}

</style>
</head>

<body>

<h1>🧠 عالم بصمة الذكاء</h1>

<img class="robot" src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<div class="box">

<h2>البيانات الأساسية</h2>

<input placeholder="اسم المدرسة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
<input placeholder="عنوان الدرس">

</div>

<div class="box">

<h2>الفصول</h2>

<input id="classInput" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة فصل</button>

<ul id="classes"></ul>

</div>

<div class="box">

<h2>المجموعات</h2>

<select id="classSelect"></select>

<input id="groupInput" placeholder="اسم المجموعة">

<button onclick="addGroup()">إضافة</button>

<table>

<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
</tr>

<tbody id="groups"></tbody>

</table>

</div>

<div class="box">

<h2>السؤال</h2>

<input id="questionInput" placeholder="اكتب السؤال">

<button onclick="showQuestion()">عرض السؤال</button>

<h3 id="question"></h3>

<br>

<input id="ans1" placeholder="الإجابة 1">
<input id="ans2" placeholder="الإجابة 2">
<input id="ans3" placeholder="الإجابة 3">
<input id="ans4" placeholder="الإجابة 4">

<select id="correct">
<option value="0">الإجابة الصحيحة 1</option>
<option value="1">الإجابة الصحيحة 2</option>
<option value="2">الإجابة الصحيحة 3</option>
<option value="3">الإجابة الصحيحة 4</option>
</select>

<button onclick="loadAnswers()">تحميل الإجابات</button>

<br><br>

<div class="circle" onclick="checkAnswer(0)" id="c1"></div>
<div class="circle" onclick="checkAnswer(1)" id="c2"></div>
<div class="circle" onclick="checkAnswer(2)" id="c3"></div>
<div class="circle" onclick="checkAnswer(3)" id="c4"></div>

</div>

<div class="box">

<button onclick="winner()">🏆 إعلان الفريق الفائز</button>

</div>

<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

let groups=[]
let classes=[]
let correctAnswer=0

/* صوت دخول */

window.onload=function(){

speak("مرحباً بكم في عالم بصمة الذكاء")

}

function speak(text){

let speech=new SpeechSynthesisUtterance(text)

speech.lang="ar-SA"

speech.rate=0.9

speech.pitch=1.1

speechSynthesis.speak(speech)

}

/* الفصول */

function addClass(){

let name=document.getElementById("classInput").value

classes.push(name)

document.getElementById("classes").innerHTML += `<li>${name}</li>`

document.getElementById("classSelect").innerHTML += `<option>${name}</option>`

}

/* المجموعات */

function addGroup(){

let name=document.getElementById("groupInput").value
let cls=document.getElementById("classSelect").value

groups.push({name:name,class:cls,points:0})

render()

}

function render(){

let html=""

groups.forEach((g,i)=>{

html+=`
<tr>
<td>${g.class}</td>
<td>${g.name}</td>
<td>${g.points}</td>
<td><button onclick="addPoint(${i})">+</button></td>
<td><button onclick="minusPoint(${i})">-</button></td>
</tr>
`

})

document.getElementById("groups").innerHTML=html

}

function addPoint(i){

groups[i].points++

render()

}

function minusPoint(i){

groups[i].points--

render()

}

/* السؤال */

function showQuestion(){

let q=document.getElementById("questionInput").value

document.getElementById("question").innerText=q

speak(q)

}

/* الإجابات */

function loadAnswers(){

c1.innerText=ans1.value
c2.innerText=ans2.value
c3.innerText=ans3.value
c4.innerText=ans4.value

correctAnswer=document.getElementById("correct").value

}

/* التحقق */

function checkAnswer(num){

if(num==correctAnswer){

document.getElementById("correctSound").play()

document.getElementById("c"+(num+1)).style.background="green"

speak("إجابة ذكية رائعة")

}else{

document.getElementById("wrongSound").play()

document.getElementById("c"+(num+1)).style.background="red"

speak("حاولي مرة أخرى")

}

}

/* الفائز */

function winner(){

let max=0
let name=""

groups.forEach(g=>{

if(g.points>max){

max=g.points
name=g.name

}

})

speak("الفريق الفائز هو "+name)

alert("🏆 الفريق الفائز: "+name)

}

</script>

</body>
</html>
