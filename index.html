 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
margin:0;
color:white;
text-align:center;
background:linear-gradient(270deg,#020617,#001a2e,#020617);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
margin-top:20px;
text-shadow:0 0 25px cyan;
}

.box{
margin:25px;
padding:25px;
border-radius:20px;
background:#0f172a;
box-shadow:0 0 30px cyan;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
cursor:pointer;
}

.circle{
width:120px;
height:120px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
font-size:18px;
background:#1e293b;
box-shadow:0 0 25px cyan;
transition:0.3s;
}

.circle:hover{
transform:scale(1.1);
}

.robot{
position:fixed;
bottom:20px;
left:20px;
width:120px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

.cup{
font-size:70px;
animation:cupmove 1s infinite alternate;
}

@keyframes cupmove{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid cyan;
padding:10px;
}

</style>
</head>

<body>

<h1>🧠 عالم بصمة الذكاء</h1>

<img class="robot" src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<div class="box">

<h2>الفصول</h2>

<input id="classInput" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة فصل</button>

<ul id="classes"></ul>

</div>

<div class="box">

<h2>المجموعات</h2>

<select id="classSelect"></select>

<input id="groupInput" placeholder="اسم المجموعة">

<button onclick="addGroup()">إضافة</button>

<table>

<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
</tr>

<tbody id="groups"></tbody>

</table>

</div>

<div class="box">

<h2>السؤال</h2>

<input id="questionInput" placeholder="اكتب السؤال">
<button onclick="showQuestion()">عرض السؤال</button>

<h3 id="question"></h3>

<br>

<input id="ans1" placeholder="الإجابة 1">
<input id="ans2" placeholder="الإجابة 2">
<input id="ans3" placeholder="الإجابة 3">
<input id="ans4" placeholder="الإجابة 4">

<select id="correct">
<option value="0">الإجابة الصحيحة 1</option>
<option value="1">الإجابة الصحيحة 2</option>
<option value="2">الإجابة الصحيحة 3</option>
<option value="3">الإجابة الصحيحة 4</option>
</select>

<button onclick="loadAnswers()">تحميل الإجابات</button>

<br><br>

<div class="circle" onclick="checkAnswer(0)" id="c1"></div>
<div class="circle" onclick="checkAnswer(1)" id="c2"></div>
<div class="circle" onclick="checkAnswer(2)" id="c3"></div>
<div class="circle" onclick="checkAnswer(3)" id="c4"></div>

</div>

<div class="box">

<h2>لوحة الترتيب</h2>

<ul id="leaderboard"></ul>

</div>

<div class="box">

<button onclick="winner()">🏆 إعلان الفريق الفائز</button>

<div id="cup"></div>

</div>

<script>

let groups=[]
let classes=[]
let correctAnswer=0

function speak(text){
let speech=new SpeechSynthesisUtterance(text)
speech.lang="ar-SA"
speech.rate=0.9
speech.pitch=1.1
speechSynthesis.speak(speech)
}

window.addEventListener("click",function startVoice(){
speak("مرحباً بكم في عالم بصمة الذكاء الاصطناعي")
window.removeEventListener("click",startVoice)
})

function addClass(){

let name=document.getElementById("classInput").value

classes.push(name)

document.getElementById("classes").innerHTML+=`<li>${name}</li>`

document.getElementById("classSelect").innerHTML+=`<option>${name}</option>`

}

function addGroup(){

let name=document.getElementById("groupInput").value
let cls=document.getElementById("classSelect").value

groups.push({name:name,class:cls,points:0})

render()

}

function render(){

let html=""

groups.forEach((g,i)=>{

html+=`
<tr>
<td>${g.class}</td>
<td>${g.name}</td>
<td>${g.points}</td>
<td><button onclick="addPoint(${i})">+</button></td>
<td><button onclick="minusPoint(${i})">-</button></td>
</tr>
`

})

document.getElementById("groups").innerHTML=html

updateBoard()

}

function addPoint(i){
groups[i].points++
render()
}

function minusPoint(i){
groups[i].points--
render()
}

function updateBoard(){

let sorted=[...groups].sort((a,b)=>b.points-a.points)

let html=""

sorted.forEach(g=>{
html+=`<li>${g.name} : ${g.points}</li>`
})

document.getElementById("leaderboard").innerHTML=html

}

function showQuestion(){

let q=document.getElementById("questionInput").value

document.getElementById("question").innerText=q

speak(q)

}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function loadAnswers(){

let answers=[
ans1.value,
ans2.value,
ans3.value,
ans4.value
]

answers=shuffle(answers)

c1.innerText=answers[0]
c2.innerText=answers[1]
c3.innerText=answers[2]
c4.innerText=answers[3]

correctAnswer=document.getElementById("correct").value

}

function checkAnswer(num){

if(num==correctAnswer){

document.getElementById("c"+(num+1)).style.background="green"
speak("إجابة ذكية رائعة")

}else{

document.getElementById("c"+(num+1)).style.background="red"
speak("حاولي مرة أخرى")

}

}

function winner(){

let max=0
let name=""

groups.forEach(g=>{
if(g.points>max){
max=g.points
name=g.name
}
})

document.getElementById("cup").innerHTML=`<div class="cup">🏆</div><h2>${name}</h2>`

speak("الفريق الفائز هو "+name)

}

</script>

</body>
</html>
