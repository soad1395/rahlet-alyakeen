 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
margin:0;
background:linear-gradient(135deg,#020f18,#001c2b,#002f3f);
color:white;
text-align:center;
}

/* صندوق */

.card{
background:#021c2d;
margin:20px auto;
width:85%;
max-width:900px;
padding:20px;
border-radius:12px;

box-shadow:
0 0 10px #00e5ff,
0 0 30px #00e5ff44,
0 0 60px #00e5ff22;
}

header{
font-size:34px;
padding:20px;
text-shadow:0 0 20px #00e5ff;
}

input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00e5ff;
cursor:pointer;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
font-size:16px;
cursor:pointer;
font-weight:bold;
background:#0b5f7a;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #00e5ff;
padding:8px;
}

</style>
</head>

<body>

<header>🧠 عالم بصمة الذكاء</header>

<div class="card">

<h3>البيانات الأساسية</h3>

<input placeholder="اسم المدرسة">
<input placeholder="اسم المديرة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
<input placeholder="عنوان الدرس">

</div>

<div class="card">

<h3>الفصول</h3>

<input id="classInput" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة فصل</button>

<ul id="classesList"></ul>

</div>

<div class="card">

<h3>المجموعات</h3>

<input id="teamName" placeholder="اسم المجموعة">
<button onclick="addTeam()">إضافة</button>

<table id="teamsTable">

<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
</tr>

</table>

</div>

<div class="card">

<h3>السؤال</h3>

<input id="questionInput" placeholder="اكتب السؤال">

<button onclick="addQuestion()">عرض السؤال</button>

<h2 id="questionTitle"></h2>

<br>

<input id="a1t" placeholder="الإجابة 1">
<input id="a2t" placeholder="الإجابة 2">
<input id="a3t" placeholder="الإجابة 3">
<input id="a4t" placeholder="الإجابة 4">

<br>

<label>الإجابة الصحيحة</label>

<select id="correctAnswer">
<option value="1">الإجابة 1</option>
<option value="2">الإجابة 2</option>
<option value="3">الإجابة 3</option>
<option value="4">الإجابة 4</option>
</select>

<button onclick="loadAnswers()">تحميل الإجابات</button>

<br><br>

<div class="circle" onclick="checkAnswer(1)" id="c1"></div>
<div class="circle" onclick="checkAnswer(2)" id="c2"></div>
<div class="circle" onclick="checkAnswer(3)" id="c3"></div>
<div class="circle" onclick="checkAnswer(4)" id="c4"></div>

</div>

<audio id="correctSound"
src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3">
</audio>

<audio id="wrongSound"
src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3">
</audio>

<script>

/* صوت دخول */

window.onload=function(){

let msg=new SpeechSynthesisUtterance(
"مرحباً بكن في عالم بصمة الذكاء"
)

msg.lang="ar-SA"

speechSynthesis.speak(msg)

}

/* الفصول */

let classes=[]

function addClass(){

let name=document.getElementById("classInput").value

classes.push(name)

renderClasses()

}

function renderClasses(){

let list=document.getElementById("classesList")

list.innerHTML=""

classes.forEach(c=>{
list.innerHTML+=`<li>${c}</li>`
})

}

/* المجموعات */

let groups=[]

function addTeam(){

let name=document.getElementById("teamName").value

groups.push({name:name,points:0})

renderGroups()

}

function renderGroups(){

let table=document.getElementById("teamsTable")

table.innerHTML=`
<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>+</th>
<th>-</th>
</tr>
`

groups.forEach((g,i)=>{

table.innerHTML+=`
<tr>
<td>${g.name}</td>
<td>${g.points}</td>
<td><button onclick="addPoint(${i})">+</button></td>
<td><button onclick="minusPoint(${i})">-</button></td>
</tr>
`

})

}

function addPoint(i){

groups[i].points++
renderGroups()

}

function minusPoint(i){

groups[i].points--
renderGroups()

}

/* السؤال */

let correct=0

function addQuestion(){

let q=document.getElementById("questionInput").value

document.getElementById("questionTitle").innerText=q

let msg=new SpeechSynthesisUtterance(q)

msg.lang="ar-SA"

speechSynthesis.speak(msg)

}

/* تحميل الإجابات */

function loadAnswers(){

c1.innerText=a1t.value
c2.innerText=a2t.value
c3.innerText=a3t.value
c4.innerText=a4t.value

correct=document.getElementById("correctAnswer").value

}

/* التحقق */

function checkAnswer(num){

let buttons=["c1","c2","c3","c4"]

buttons.forEach(id=>{
document.getElementById(id).style.background="#0b5f7a"
})

if(num==correct){

document.getElementById("c"+num).style.background="green"

correctSound.play()

let msg=new SpeechSynthesisUtterance(
"إجابة صحيحة. أحسنتم."
)

speechSynthesis.speak(msg)

}
else{

document.getElementById("c"+num).style.background="red"

wrongSound.play()

let msg=new SpeechSynthesisUtterance(
"محاولة جيدة. فكري مرة أخرى."
)

speechSynthesis.speak(msg)

}

}

</script>

</body>
</html>
