 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
background:#020617;
overflow-x:hidden;
}

/* خلفية نيون متحركة */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, #00eaff55, transparent),
radial-gradient(circle at 80% 70%, #7c3aed55, transparent),
radial-gradient(circle at 50% 100%, #00ffcc55, transparent);
animation:move 10s infinite alternate;
z-index:-1;
}

@keyframes move{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.box{
background:#031429;
padding:25px;
margin:25px 0;
border-radius:20px;
box-shadow:0 0 25px #00eaff55;
}

/* إدخال */

input,select{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
width:180px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#00eaff;
color:black;
cursor:pointer;
font-weight:bold;
}

/* الإجابات */

.answers{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px #00eaff;
transition:0.3s;
}

.circle:hover{transform:scale(1.1)}

.correct{background:#22c55e}
.wrong{background:#ef4444}

/* روبوت */

.robot{
position:fixed;
bottom:20px;
left:20px;
font-size:80px;
filter:drop-shadow(0 0 10px #00eaff);
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 عالم بصمة الذكاء</h1>

<div class="box">
<h2>📋 البيانات الأساسية</h2>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المديرة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<div class="box">
<h2>👥 الفصول</h2>
<input id="className" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة</button>
<ul id="classList"></ul>
</div>

<div class="box">
<h2>👨‍👩‍👧 المجموعات</h2>

<select id="classSelect"></select>
<input id="groupName" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>

<table width="100%" id="groupsTable">
<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
<th>حذف</th>
</tr>
</table>

</div>

<div class="box">
<h2>🎮 السؤال</h2>

<input id="question" placeholder="اكتب السؤال"><br>

<input id="a1" placeholder="إجابة 1">
<input id="a2" placeholder="إجابة 2">
<input id="a3" placeholder="إجابة 3">
<input id="a4" placeholder="إجابة 4"><br>

<select id="correct">
<option value="1">الإجابة الصحيحة 1</option>
<option value="2">الإجابة الصحيحة 2</option>
<option value="3">الإجابة الصحيحة 3</option>
<option value="4">الإجابة الصحيحة 4</option>
</select>

<br><br>

<button onclick="showQuestion()">عرض السؤال</button>

<div class="answers" id="answers"></div>

</div>

<div class="box">
<button onclick="winner()">🏆 إعلان الفريق الفائز</button>
<h2 id="winner"></h2>
</div>

</div>

<div class="robot">🤖✨</div>

<script>

let classes=[]
let groups=[]
let currentCorrect=1

function speak(text){

speechSynthesis.cancel()

let msg=new SpeechSynthesisUtterance(text)
msg.lang="ar-SA"
msg.rate=0.9

speechSynthesis.speak(msg)

}

/* صوت الدخول */

document.body.addEventListener("click", function(){
speak("مرحباً بكم في عالم الذكاء الاصطناعي");
},{once:true});

/* الفصول */

function addClass(){

let name=document.getElementById("className").value
if(!name)return

classes.push(name)

let li=document.createElement("li")
li.innerText=name
document.getElementById("classList").appendChild(li)

let op=document.createElement("option")
op.value=name
op.text=name
document.getElementById("classSelect").appendChild(op)

}

/* المجموعات */

function addGroup(){

let c=document.getElementById("classSelect").value
let g=document.getElementById("groupName").value

if(!g)return

groups.push({class:c,name:g,points:0})

renderGroups()

}

function renderGroups(){

let table=document.getElementById("groupsTable")

table.innerHTML=`
<tr>
<th>الفصل</th>
<th>المجموعة</th>
<th>النقاط</th>
<th>حذف</th>
</tr>
`

groups.forEach((g,i)=>{

table.innerHTML+=`
<tr>
<td>${g.class}</td>
<td>${g.name}</td>
<td>${g.points}</td>
<td><button onclick="deleteGroup(${i})">🗑️</button></td>
</tr>
`

})

}

function deleteGroup(i){

groups.splice(i,1)
renderGroups()

}

/* السؤال */

function showQuestion(){

let q=document.getElementById("question").value
speak(q)

let answers=[
document.getElementById("a1").value,
document.getElementById("a2").value,
document.getElementById("a3").value,
document.getElementById("a4").value
]

currentCorrect=parseInt(document.getElementById("correct").value)

let box=document.getElementById("answers")
box.innerHTML=""

answers.forEach((a,i)=>{

let div=document.createElement("div")
div.className="circle"
div.innerText=a

div.onclick=function(){

if((i+1)==currentCorrect){

div.classList.add("correct")
speak("إجابة صحيحة ممتاز")

if(groups.length>0){
groups[0].points++
renderGroups()
}

}else{

div.classList.add("wrong")
speak("إجابة خاطئة")

}

}

box.appendChild(div)

})

}

/* الفائز */

function winner(){

if(groups.length==0)return

let best=groups.reduce((a,b)=>a.points>b.points?a:b)

document.getElementById("winner").innerText=
"🏆 الفريق الفائز: "+best.name+" ("+best.class+")"

speak("الفريق الفائز هو "+best.name)

}

</script>

</body>
</html>
